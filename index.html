<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurador 3D · Aparador · Vitrinas Sílice</title>
<style>
  * { box-sizing: border-box; }

  :root {
    --bg-deep: #0a0e18;
    --bg-panel: rgba(17, 24, 39, 0.55);
    --border-glass: rgba(143, 178, 255, 0.18);
    --accent: #3b9eff;
    --accent-glow: #4fd1ff;
    --text-main: #e6ecff;
    --text-dim: #8896b3;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 20%, #142036 0%, var(--bg-deep) 60%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
    overflow: hidden;
  }

  #app {
    display: flex;
    width: 100vw;
    height: 100vh;
  }

  /* ---------- PANEL LATERAL ---------- */
  #controls-panel {
    width: 320px;
    min-width: 320px;
    height: 100%;
    padding: 24px;
    background: var(--bg-panel);
    backdrop-filter: blur(18px) saturate(140%);
    border-right: 1px solid var(--border-glass);
    display: flex;
    flex-direction: column;
    gap: 22px;
    overflow-y: auto;
    box-shadow: 4px 0 30px rgba(0,0,0,0.35);
  }

  #controls-panel::-webkit-scrollbar { width: 6px; }
  #controls-panel::-webkit-scrollbar-thumb {
    background: rgba(143, 178, 255, 0.25);
    border-radius: 4px;
  }

  .panel-header {
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-bottom: 1px solid var(--border-glass);
    padding-bottom: 14px;
  }

  .panel-header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent-glow), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .panel-header span {
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ---------- SECCIONES ---------- */
  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent-glow);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    display: block;
    width: 14px;
    height: 2px;
    background: var(--accent-glow);
    border-radius: 2px;
  }

  .control-group {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-glass);
    border-radius: 14px;
    padding: 16px;
  }

  .control-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .control-row + .control-row { margin-top: 14px; }

  .control-row .value {
    font-weight: 700;
    color: var(--text-main);
    font-size: 0.95rem;
  }

  /* ---------- SLIDERS ---------- */
  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent) 0%, rgba(143,178,255,0.15) 0%);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent-glow);
    box-shadow: 0 0 8px var(--accent-glow), 0 0 2px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent-glow);
    border: none;
    box-shadow: 0 0 8px var(--accent-glow);
    cursor: pointer;
  }

  /* ---------- ACABADOS (SWATCHES) ---------- */
  .acabados-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 4px;
  }

  .acabado-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }

  .acabado-swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    border: 2px solid transparent;
    transition: all 0.18s ease;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  }

  .acabado-btn span {
    font-size: 0.68rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.2;
  }

  .acabado-btn.active .acabado-swatch {
    border-color: var(--accent-glow);
    box-shadow: 0 0 10px var(--accent-glow);
    transform: scale(1.05);
  }

  .acabado-btn.active span { color: var(--text-main); }

  .swatch-nogal  { background: #6b4226; }
  .swatch-blanco { background: #f3f1ec; }
  .swatch-negro  { background: #161616; }
  .swatch-encino { background: #c8a978; }

  /* ---------- TOGGLES ---------- */
  .toggle-btn {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border-glass);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    position: relative;
  }

  .toggle-btn::after {
    content: '○';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    color: var(--text-dim);
  }

  .toggle-btn.active {
    border-color: var(--accent-glow);
    color: var(--text-main);
    background: rgba(79, 209, 255, 0.08);
    box-shadow: 0 0 14px rgba(79, 209, 255, 0.15);
  }

  .toggle-btn.active::after {
    content: '●';
    color: var(--accent-glow);
    text-shadow: 0 0 6px var(--accent-glow);
  }

  .toggle-btn + .toggle-btn { margin-top: 10px; }

  /* ---------- PRECIO ---------- */
  .price-card {
    margin-top: auto;
    background: linear-gradient(135deg, rgba(59,158,255,0.12), rgba(79,209,255,0.04));
    border: 1px solid var(--border-glass);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
  }

  .price-card .label {
    font-size: 0.72rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .price-card .price {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--accent-glow);
    text-shadow: 0 0 16px rgba(79, 209, 255, 0.35);
  }

  .price-card .currency {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-left: 4px;
  }

  .price-card .note {
    margin-top: 6px;
    font-size: 0.68rem;
    color: var(--text-dim);
  }

  /* ---------- CANVAS ---------- */
  #canvas-container {
    flex-grow: 1;
    height: 100%;
    position: relative;
  }

  #canvas-container::after {
    content: 'APARADOR · MODELO 1 DE 3';
    position: absolute;
    bottom: 18px;
    right: 22px;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: rgba(143, 178, 255, 0.35);
    pointer-events: none;
  }
</style>

<!-- Import Map: librerías locales -->
<script type="importmap">
{
    "imports": {
        "three": "./js/vendor/three/three.module.js",
        "three/addons/": "./js/vendor/three/"
    }
}
</script>
</head>
<body>
<div id="app">

  <!-- ================= PANEL DE CONTROLES ================= -->
  <div id="controls-panel">

    <div class="panel-header">
      <span>Vitrinas Sílice · QuoteFlow</span>
      <h1>Configurador Aparador</h1>
    </div>

    <!-- DIMENSIONES -->
    <div>
      <div class="section-title">Dimensiones</div>
      <div class="control-group">
        <div class="control-row">
          <span>Ancho</span>
          <span class="value"><span id="ancho-val">100</span> cm</span>
        </div>
        <input type="range" id="ancho-slider" min="50" max="200" value="100" step="5">

        <div class="control-row">
          <span>Alto</span>
          <span class="value"><span id="alto-val">120</span> cm</span>
        </div>
        <input type="range" id="alto-slider" min="80" max="220" value="120" step="5">

        <div class="control-row">
          <span>Profundidad</span>
          <span class="value"><span id="profundidad-val">50</span> cm</span>
        </div>
        <input type="range" id="profundidad-slider" min="35" max="90" value="50" step="5">
      </div>
    </div>

    <!-- ACABADO -->
    <div>
      <div class="section-title">Acabado de Madera</div>
      <div class="control-group">
        <div class="acabados-grid">
          <button class="acabado-btn active" data-acabado="nogal">
            <span class="acabado-swatch swatch-nogal"></span>
            <span>Nogal</span>
          </button>
          <button class="acabado-btn" data-acabado="blanco">
            <span class="acabado-swatch swatch-blanco"></span>
            <span>Blanco</span>
          </button>
          <button class="acabado-btn" data-acabado="negro">
            <span class="acabado-swatch swatch-negro"></span>
            <span>Negro Mate</span>
          </button>
          <button class="acabado-btn" data-acabado="encino">
            <span class="acabado-swatch swatch-encino"></span>
            <span>Encino</span>
          </button>
        </div>
      </div>
    </div>

    <!-- INTERIOR -->
    <div>
      <div class="section-title">Interior</div>
      <div class="control-group">
        <div class="control-row">
          <span>Entrepaños de cristal</span>
          <span class="value"><span id="entrepanos-val">1</span></span>
        </div>
        <input type="range" id="entrepanos-slider" min="0" max="5" value="1" step="1">
      </div>
    </div>

    <!-- EXTRAS -->
    <div>
      <div class="section-title">Extras</div>
      <button id="led-toggle" class="toggle-btn">Iluminación LED: OFF</button>
      <button id="puertas-toggle" class="toggle-btn">Puertas: Cerradas</button>
    </div>

    <!-- PRECIO -->
    <div class="price-card">
      <div class="label">Cotización Estimada</div>
      <div><span class="price" id="precio-val">$4,500</span><span class="currency">MXN</span></div>
      <div class="note">Precio referencial · sujeto a confirmación</div>
    </div>

  </div>

  <!-- ================= VISOR 3D ================= -->
  <div id="canvas-container"></div>

</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
